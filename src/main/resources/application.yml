tdengine:
  # Connection mode: jdbc / restful
  connection-mode: restful
  # JDBC configuration
  jdbc:
    driver-class-name: com.taosdata.jdbc.TSDBDriver
    url: jdbc:TAOS://127.0.0.1:6030
    #url: jdbc:TAOS://192.168.3.145:6030
    username: root
    password: taosdata
  # REST API configuration
  restful:
    url: http://127.0.0.1:6041
    #url: http://192.168.3.145:6041
    username: root
    password: taosdata
    # REST/JDBC timeouts in milliseconds (default 300000 = 300s)
    connect-timeout: 300000
    socket-timeout: 300000
    request-timeout: 300000
  # Run mode: export / import
  mode: import
  # Data directory for export/import files
  data-dir: ./data
  # Target database name
  database: dbtest01
  # Import target database (optional, defaults to same as database above when not set)
  target-database: dbtest02
  # Super tables list (empty means all super tables)
  super-tables: []
  # Export start time (inclusive). Format: "yyyy-MM-dd" or "yyyy-MM-dd HH:mm:ss"
  # Leave blank to auto-detect from database (MIN(ts) across all tables)
  start-time: "2026-03-31 00:00:00"
  # Export end time (exclusive). Format: "yyyy-MM-dd" or "yyyy-MM-dd HH:mm:ss"
  # Leave blank to auto-detect from database (MAX(ts) across all tables)
  end-time: "2026-05-02 00:00:00"
  # Common non-time export conditions applied to all super tables
  export-conditions: ""
  # Export SQL order by timestamp ascending (false = faster throughput, true = stable row order)
  export-order-by-ts: false
  # Per-super-table additional non-time conditions (appended with AND to common conditions)
  stable-conditions: {}
    # stable_history_data: "thing_id = '023109006'"
    # st1: "v1 > 100"
    # st2: "status = 'active'"
  # Export file rotation size in MB (default 100)
  file-size-mb: 100
  # Records per compressed block file
  block-size: 100000
  # Compression format: gzip
  compression: gzip
  # Data file format: csv (fast) / json (compatible)
  format: csv
  # Parallel threads for export/import (partition + per-day parallelism, multi-super-table + multi-writer import)
  parallel: 50
  # Batch insert size for import (larger = fewer HTTP round-trips)
  batch-size: 5000
  # Pipeline queue size (number of batches buffered between reader and writer)
  pipeline-queue-size: 50
  # Connection pool size (0 disables pooling, default 50)
  connection-pool-size: 60
  # Page size for LIMIT/OFFSET pagination in export (default 5000).
  # Larger = fewer HTTP requests but more memory per page.
  page-size: 5000
  # Time window (minutes) per export partition (default 5).
  # Smaller = more parallelism but more files.
  partition-window-minutes: 5